<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#c026d3"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <linearGradient id="forge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0abfc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" opacity="0.15"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#bg)" stroke-width="4"/>
  <!-- Star/Astra symbol -->
  <path d="M256 80 L280 200 L400 200 L300 270 L330 390 L256 310 L182 390 L212 270 L112 200 L232 200 Z" 
        fill="url(#star)" opacity="0.9"/>
  <!-- Forge anvil symbol overlay -->
  <path d="M180 320 L332 320 L340 340 L360 340 L360 360 L152 360 L152 340 L172 340 Z" 
        fill="url(#forge)" opacity="0.8"/>
  <!-- Code brackets -->
  <text x="140" y="440" font-family="monospace" font-size="64" font-weight="bold" fill="url(#bg)" opacity="0.7">&lt;</text>
  <text x="340" y="440" font-family="monospace" font-size="64" font-weight="bold" fill="url(#bg)" opacity="0.7">/&gt;</text>
</svg>
