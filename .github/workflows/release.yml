name: Release AstraForge

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.1.1-{0}', github.sha) }}
          releaseName: 'AstraForge ${{ github.ref_type == 'tag' && github.ref_name || 'Development Build' }}'
          releaseBody: |
            ## AstraForge ${{ github.ref_name }}
            
            ### Downloads
            - **Windows MSI Installer** — Recommended for most users
            - **Windows NSIS Installer** — Alternative installer
            
            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false

